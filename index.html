<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>เข้าสู่ระบบ – ยาหมดอายุ รพ.สต.</title>
<link rel="stylesheet" href="style.css">
<style>
body { background: linear-gradient(135deg,#0891b2 0%,#0d9488 100%); min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 1rem; }
.login-card { background: #fff; border-radius: 20px; padding: 2.2rem 2rem; width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,.25); }
.logo { text-align: center; margin-bottom: 1.5rem; }
.logo-icon { width: 72px; height: 72px; background: #f0f9ff; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto .8rem; font-size: 2rem; }
.logo h1 { font-size: 1.15rem; font-weight: 800; color: var(--text); line-height: 1.3; }
.logo p { font-size: .82rem; color: var(--sub); margin-top: .3rem; }
.footer-note { color: rgba(255,255,255,.75); font-size: .8rem; margin-top: 1.2rem; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">🏡</div>
    <h1>ระบบยาหมดอายุ รพ.สต.</h1>
    <p>ภายใต้การดูแลของ รพ.แม่แตง</p>
  </div>
  <div class="alert alert-err" id="errBox"></div>
  <div class="field">
    <label>Username</label>
    <input type="text" id="username" placeholder="กรอก Username" autocomplete="username">
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="กรอก Password" autocomplete="current-password">
  </div>
  <button class="btn btn-teal" style="width:100%;justify-content:center;padding:.8rem;font-size:1rem" id="loginBtn" onclick="doLogin()">
    เข้าสู่ระบบ
  </button>
</div>
<div class="footer-note">© 2026 รพ.แม่แตง</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script>
// redirect ถ้า login แล้ว
if (getSession()) window.location.href = 'dashboard.html';

document.getElementById('password').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function doLogin() {
  const u   = document.getElementById('username').value.trim();
  const p   = document.getElementById('password').value;
  const btn = document.getElementById('loginBtn');
  const err = document.getElementById('errBox');

  if (!u || !p) { showErr('กรุณากรอก Username และ Password'); return; }

  btn.disabled = true;
  btn.innerHTML = '<span class="btn-spin"></span> กำลังเข้าสู่ระบบ...';
  err.className = 'alert alert-err';

  const res = await api('login', { username: u, password: p });

  btn.disabled = false;
  btn.textContent = 'เข้าสู่ระบบ';

  if (!res || !res.ok) { showErr(res ? res.error : 'เกิดข้อผิดพลาด'); return; }

  setSession(res.data);
  window.location.href = 'dashboard.html';
}

function showErr(msg) {
  const el = document.getElementById('errBox');
  el.textContent = '⚠️ ' + msg;
  el.className = 'alert alert-err show';
}
</script>
</body>
</html>
